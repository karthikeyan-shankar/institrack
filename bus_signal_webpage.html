<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Signal Trigger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .response {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            display: none;
        }

        .response.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }

        .response.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }

        .response h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .response-details {
            font-size: 14px;
            line-height: 1.6;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 3px;
            font-size: 13px;
            color: #31708f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚌 Bus Signal Trigger</h1>
        <p class="subtitle">Send a signal when bus reaches a stop</p>

        <div class="info-box">
            ℹ️ This mock webpage sends signals to your bus tracking server to notify registered users.
        </div>

        <form id="busForm">
            <div class="form-group">
                <label for="busNumber">Bus Number</label>
                <select id="busNumber" required>
                    <option value="">Select a bus...</option>
                    <option value="7">Bus 7</option>
                    <option value="12">Bus 12</option>
                    <option value="5">Bus 5</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Bus Stop Location</label>
                <select id="location" required>
                    <option value="">Select a stop...</option>
                </select>
            </div>

            <button type="submit">📤 Send Signal</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Sending signal...</p>
        </div>

        <div class="response" id="response">
            <h3 id="responseTitle"></h3>
            <div class="response-details" id="responseDetails"></div>
        </div>
    </div>

    <script>
        // Bus stops mapping
        const busStops = {
            "7": ["Stop A", "Stop B", "Stop C", "Stop D"],
            "12": ["Stop X", "Stop Y", "Stop Z"],
            "5": ["Stop M", "Stop N", "Stop O"]
        };

        // Get server URL
        const getServerURL = () => {
            // Use the same domain as the current page (automatically handles port 5000)
            return `${window.location.protocol}//${window.location.host}`;
        };

        // Update stops when bus is selected
        document.getElementById('busNumber').addEventListener('change', function() {
            const busNum = this.value;
            const locationSelect = document.getElementById('location');
            locationSelect.innerHTML = '<option value="">Select a stop...</option>';
            
            if (busNum && busStops[busNum]) {
                busStops[busNum].forEach(stop => {
                    const option = document.createElement('option');
                    option.value = stop;
                    option.textContent = stop;
                    locationSelect.appendChild(option);
                });
            }
        });

        // Handle form submission
        document.getElementById('busForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const busNumber = document.getElementById('busNumber').value;
            const location = document.getElementById('location').value;
            
            if (!busNumber || !location) {
                showError('Please select both bus number and location');
                return;
            }

            const serverURL = getServerURL();
            
            // Show loading state
            document.getElementById('loading').style.display = 'block';
            document.getElementById('response').style.display = 'none';

            try {
                const response = await fetch(`${serverURL}/bus-signal`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        bus_number: busNumber,
                        location: location
                    })
                });

                const data = await response.json();

                // Hide loading
                document.getElementById('loading').style.display = 'none';

                if (response.ok) {
                    showSuccess(data);
                } else {
                    showError(data.message || 'Error sending signal');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showError(`Connection error: ${error.message}. Make sure the server is running on ${serverURL}`);
            }
        });

        function showSuccess(data) {
            const responseEl = document.getElementById('response');
            const titleEl = document.getElementById('responseTitle');
            const detailsEl = document.getElementById('responseDetails');
            
            responseEl.className = 'response success';
            titleEl.textContent = '✅ Signal Sent Successfully!';
            
            let html = `<p><strong>${data.message}</strong></p>`;
            html += `<p style="margin-top: 10px;">📊 <strong>Notified Users:</strong> ${data.notified_count}</p>`;
            
            if (data.notified_users && data.notified_users.length > 0) {
                html += `<p>📱 <strong>User Numbers:</strong> ${data.notified_users.map(u => `+${u}`).join(', ')}</p>`;
            } else {
                html += `<p>⚠️ No users registered for this bus/stop combination</p>`;
            }
            
            // Add debug info to UI
            if (data.debug) {
                html += `<div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; font-family: monospace; font-size: 12px; overflow-x: auto;">`;
                html += `<strong>Debug Info:</strong><br>`;
                html += `Searching for: Bus ${data.debug.searching_for.bus}, Stop "${data.debug.searching_for.stop}"<br>`;
                html += `All Registered:<br>`;
                data.debug.all_registered_users.forEach(u => {
                    const status = u.is_registered ? '✅' : '❌';
                    html += `- ${status} +${u.phone}: Bus ${u.bus}, Stop "${u.stop}"<br>`;
                });
                html += `</div>`;
            }
            
            detailsEl.innerHTML = html;
            responseEl.style.display = 'block';
        }

        function showError(message) {
            const responseEl = document.getElementById('response');
            const titleEl = document.getElementById('responseTitle');
            const detailsEl = document.getElementById('responseDetails');
            
            responseEl.className = 'response error';
            titleEl.textContent = '❌ Error';
            detailsEl.textContent = message;
            responseEl.style.display = 'block';
        }
    </script>
</body>
</html>
